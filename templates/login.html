<!DOCTYPE html>
<html>

<head>

<title>Smart Irrigation AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
margin:0;
background:linear-gradient(135deg,#0f172a,#22c55e);
display:flex;
align-items:center;
justify-content:center;
font-family:Segoe UI;
}

.login-box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:40px;
border-radius:15px;
width:320px;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

.login-box button{
width:100%;
padding:12px;
margin-top:20px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
transition:0.3s;
}

.login-box button:hover{
background:#16a34a;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="login-box">

<h2>🌱 Smart Irrigation AI</h2>

<form method="POST">

<input name="username" placeholder="Username">

<input name="password" type="password" placeholder="Password">

<button>Login</button>

</form>

</div>

</body>

</html>
