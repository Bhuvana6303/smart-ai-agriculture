<!DOCTYPE html>
<html>

<head>

<title>Smart Irrigation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h3>🌱 Irrigation AI</h3>

<a href="#">Dashboard</a>
<a href="#">Sensors</a>
<a href="#">Reports</a>
<a href="/history">📜 History</a>
<a href="#">Settings</a>
<a href="/logout">Logout</a>

</div>

<!-- MAIN -->
<div class="main">

<h2 class="title">Smart Irrigation Dashboard</h2>

<div class="center-box">

<div class="card p-4">

<h4>Sensor Analysis</h4>

<input id="moisture" class="form-control mt-2" placeholder="Soil Moisture">

<input id="temperature" class="form-control mt-2" placeholder="Temperature">

<button onclick="analyze()" class="btn btn-success mt-3 w-100">Analyze</button>

<div id="result" class="mt-3"></div>

<canvas id="chart"></canvas>

</div>

</div>

</div>

<!-- CHAT -->
<div id="chatIcon" onclick="toggleChat()">💬</div>

<div id="chatPopup">

<div class="chatHeader">
🤖 AI Assistant
<span onclick="toggleChat()">✖</span>
</div>

<div id="chatBox"></div>

<div class="chatInput">
<input id="chatInput" placeholder="Ask something...">
<button onclick="sendMessage()">➤</button>
</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
